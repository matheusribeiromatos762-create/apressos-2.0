<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apressos 2.0 - Dashboard</title>

  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>

<body onload="carregarLayout('dashboard'); carregarDashboard();">

<div class="layout">

  <aside class="sidebar"></aside>

  <main class="conteudo">
    <header class="topbar">
      <div>
        <h1>Dashboard</h1>
        <p id="usuarioLogado">Bem-vindo</p>
      </div>

      <div class="status">
        <span class="online"></span>
        Sistema Online
      </div>
    </header>

    <section class="cards">
      <div class="card">
        <p>Vendas Hoje</p>
        <h2 id="vendasHoje">0</h2>
      </div>

      <div class="card destaque">
        <p>Total Hoje</p>
        <h2 id="totalHoje">R$ 0,00</h2>
      </div>

      <div class="card">
        <p>Produtos</p>
        <h2 id="produtos">0</h2>
      </div>

      <div class="card alerta">
        <p>Estoque Baixo</p>
        <h2 id="estoqueBaixo">0</h2>
      </div>
    </section>

    <section class="grid">
      <div class="painel grande">
        <h2>Resumo de Vendas</h2>
        <div class="grafico-fake">
          <div style="height: 45%"></div>
          <div style="height: 70%"></div>
          <div style="height: 35%"></div>
          <div style="height: 85%"></div>
          <div style="height: 55%"></div>
          <div style="height: 95%"></div>
          <div style="height: 60%"></div>
        </div>
      </div>

      <div class="painel">
        <h2>Atalhos Rápidos</h2>
        <button onclick="window.location.href='caixa.html'">🧾 Abrir Caixa</button>
        <button onclick="window.location.href='produtos.html'">📦 Cadastrar Produto</button>
        <button onclick="window.location.href='relatorios.html'">📄 Relatórios</button>
      </div>

      <div class="painel">
        <h2>Alertas</h2>
        <p>✅ Sistema iniciado com sucesso</p>
        <p>📦 Produtos cadastrados no banco</p>
        <p>🏷️ Categorias funcionando</p>
      </div>
    </section>
  </main>

</div>

<script src="/assets/js/global.js"></script>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/dashboard.js"></script>

</body>
</html>
