<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Apressos 2.0</title>

    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/estoque.css">
</head>

<body onload="carregarLayout('estoque')">

<div class="layout">

    <aside class="sidebar"></aside>

    <main class="conteudo">

        <header class="topbar">
            <div>
                <h1>Controle de Estoque</h1>
                <p>Visualize produtos, estoque atual e estoque mínimo</p>
            </div>

            <div class="status">
                <span class="online"></span>
                Estoque
            </div>
        </header>

        <section class="cards-estoque">

            <div class="card-info">
                <p>Total de Produtos</p>
                <h2 id="totalProdutos">0</h2>
            </div>

            <div class="card-info alerta">
                <p>Estoque Baixo</p>
                <h2 id="estoqueBaixo">0</h2>
            </div>

            <div class="card-info danger">
                <p>Sem Estoque</p>
                <h2 id="semEstoque">0</h2>
            </div>

            <div class="card-info money">
                <p>Valor em Estoque</p>
                <h2 id="valorEstoque">R$ 0,00</h2>
            </div>

        </section>

        <section class="card">

            <div class="topo-card">
                <h2>Produtos em Estoque</h2>

                <input
                    type="text"
                    id="pesquisaEstoque"
                    placeholder="Pesquisar por nome, código ou categoria"
                    oninput="filtrarEstoque()"
                >
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Produto</th>
                        <th>Categoria</th>
                        <th>Estoque Atual</th>
                        <th>Estoque Mínimo</th>
                        <th>Situação</th>
                    </tr>
                </thead>

                <tbody id="listaEstoque"></tbody>
            </table>

        </section>

    </main>

</div>

<script src="/assets/js/global.js"></script>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/estoque.js"></script>

</body>
</html>
