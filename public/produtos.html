<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Apressos 2.0</title>

    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/produtos.css">
</head>

<body onload="carregarLayout('produtos')">

<div class="layout">

    <aside class="sidebar"></aside>

    <main class="conteudo">

        <header class="topbar">
            <div>
                <h1>Cadastro de Produtos</h1>
                <p>Gerencie os produtos do supermercado</p>
            </div>

            <div class="status">
                <span class="online"></span>
                Produtos
            </div>
        </header>

        <div class="card">

            <h2>Novo Produto</h2>

            <div class="linha">

                <div class="campo">
                    <label>Nome do Produto</label>
                    <input type="text" id="nome" placeholder="Ex: Coca-Cola 2L">
                </div>

                <div class="campo">
                    <label>Código de Barras</label>
                    <input type="text" id="codigo" placeholder="Digite ou escaneie o código">
                </div>

            </div>

            <div class="linha">

                <div class="campo">
                    <label>Categoria</label>
                    <select id="categoria">
                        <option value="">Selecione</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Marca</label>
                    <input type="text" id="marca" placeholder="Ex: Coca-Cola">
                </div>

            </div>

            <div class="linha">

                <div class="campo">
                    <label>Preço de Custo</label>
                    <input type="number" id="custo" placeholder="0.00" step="0.01">
                </div>

                <div class="campo">
                    <label>Preço de Venda</label>
                    <input type="number" id="preco" placeholder="0.00" step="0.01">
                </div>

            </div>

            <div class="linha">

                <div class="campo">
                    <label>Estoque Atual</label>
                    <input type="number" id="estoque" placeholder="0">
                </div>

                <div class="campo">
                    <label>Estoque Mínimo</label>
                    <input type="number" id="estoqueMinimo" placeholder="0">
                </div>

            </div>

            <div class="botoes">

                <button type="button" class="salvar" id="btnSalvar" onclick="salvarProduto()">
                    Salvar Produto
                </button>

                <button type="button" class="cancelar" onclick="limparFormulario()">
                    Limpar
                </button>

            </div>

        </div>

        <div class="card">

            <div class="topo-card">
                <h2>Lista de Produtos</h2>

                <input
                    type="text"
                    id="pesquisaProduto"
                    placeholder="Pesquisar por nome, código ou categoria"
                    oninput="filtrarProdutos()"
                >
            </div>

            <table>

                <thead>

                    <tr>
                        <th>Código</th>
                        <th>Produto</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="listaProdutos"></tbody>

            </table>

        </div>

    </main>

</div>

<script src="/assets/js/global.js"></script>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/produtos.js"></script>

</body>

</html>
