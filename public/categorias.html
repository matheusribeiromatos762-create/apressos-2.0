<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias - Apressos 2.0</title>

    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/categorias.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
    <div class="logo">🛒 APRESSOS</div>

    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="#">🧾 Caixa</a>
    <a href="produtos.html">📦 Produtos</a>
    <a href="categorias.html">🏷️ Categorias</a>
    <a href="#">📊 Estoque</a>
    <a href="#">👥 Clientes</a>
    <a href="#">🚚 Fornecedores</a>
    <a href="#">📄 Relatórios</a>
    <a href="#">👤 Usuários</a>
    <a href="#">⚙️ Configurações</a>

    <button class="btn-sair" onclick="sair()">Sair</button>
</aside>

    <main class="conteudo">
        <div class="topbar">
            <h1>Categorias</h1>
        </div>

        <div class="card">
            <h2>Nova Categoria</h2>

            <div class="linha">
                <div class="campo">
                    <label>Nome da Categoria</label>
                    <input type="text" id="nomeCategoria" placeholder="Ex: BEBIDAS">
                </div>
            </div>

            <button type="button" class="salvar" onclick="salvarCategoria()">
                Salvar Categoria
            </button>
        </div>

        <div class="card">
            <h2>Lista de Categorias</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Categoria</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaCategorias"></tbody>
            </table>
        </div>
    </main>
</div>

<script src="/assets/js/global.js"></script>
<script src="/assets/js/categorias.js"></script>
</body>
</html>
