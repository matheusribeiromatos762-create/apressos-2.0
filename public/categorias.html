<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias - Apressos 2.0</title>

    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/categorias.css">
</head>

<body onload="carregarLayout('categorias')">

<div class="layout">

    <aside class="sidebar"></aside>

    <main class="conteudo">

        <header class="topbar">
            <div>
                <h1>Categorias</h1>
                <p>Cadastre e organize as categorias dos produtos</p>
            </div>

            <div class="status">
                <span class="online"></span>
                Categorias
            </div>
        </header>

        <div class="card">

            <h2>Nova Categoria</h2>

            <div class="linha">
                <div class="campo">
                    <label>Nome da Categoria</label>
                    <input type="text" id="nomeCategoria" placeholder="Ex: BEBIDAS">
                </div>
            </div>

            <button type="button" class="salvar" id="btnSalvarCategoria">
                Salvar Categoria
            </button>

        </div>

        <div class="card">

            <h2>Lista de Categorias</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Categoria</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="listaCategorias"></tbody>
            </table>

        </div>

    </main>

</div>

<script src="/assets/js/global.js"></script>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/categorias.js"></script>

</body>
</html>
