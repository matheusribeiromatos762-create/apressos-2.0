<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Clientes - Apressos 2.0</title>

    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/clientes.css">
</head>

<body onload="carregarLayout('clientes')">

<div class="layout">
    <aside class="sidebar"></aside>

    <main class="conteudo">
        <header class="topbar">
            <div>
                <h1>Clientes</h1>
                <p>Cadastro de clientes, contatos e fiado</p>
            </div>

            <div class="status">
                <span class="online"></span>
                Clientes
            </div>
        </header>

        <section class="card">
            <h2 id="tituloFormulario">Novo Cliente</h2>

            <input type="hidden" id="clienteId">

            <div class="linha">
                <div class="campo">
                    <label>Nome</label>
                    <input type="text" id="nome" placeholder="Nome completo">
                </div>

                <div class="campo">
                    <label>CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Telefone</label>
                    <input type="text" id="telefone" placeholder="(00) 00000-0000">
                </div>

                <div class="campo">
                    <label>WhatsApp</label>
                    <input type="text" id="whatsapp" placeholder="(00) 00000-0000">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="cliente@email.com">
                </div>

                <div class="campo">
                    <label>Cidade</label>
                    <input type="text" id="cidade" placeholder="Anápolis">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Endereço</label>
                    <input type="text" id="endereco" placeholder="Rua, número, bairro">
                </div>

                <div class="campo">
                    <label>Limite de Fiado</label>
                    <input type="number" id="limiteFiado" placeholder="0.00" step="0.01">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Saldo Devedor</label>
                    <input type="number" id="saldoDevedor" placeholder="0.00" step="0.01">
                </div>

                <div class="campo">
                    <label>Observações</label>
                    <input type="text" id="observacoes" placeholder="Observações sobre o cliente">
                </div>
            </div>

            <div class="botoes">
                <button class="salvar" onclick="salvarCliente()">Salvar Cliente</button>
                <button class="cancelar" onclick="limparFormulario()">Limpar</button>
            </div>
        </section>

        <section class="card">
            <div class="topo-card">
                <h2>Lista de Clientes</h2>

                <input
                    type="text"
                    id="pesquisaCliente"
                    placeholder="Pesquisar por nome, CPF ou telefone"
                    oninput="filtrarClientes()"
                >
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Telefone</th>
                        <th>WhatsApp</th>
                        <th>Limite</th>
                        <th>Saldo</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="listaClientes"></tbody>
            </table>
        </section>
    </main>
</div>

<script src="/assets/js/global.js"></script>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/clientes.js"></script>

</body>
</html>
